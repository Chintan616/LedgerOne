        enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 300000   # 5 minutes default TTL

invoice-service:
  url: http://localhost:8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    com.ledgerone: DEBUG
