server:
  port: 8083

spring:
  application:
    name: accounting-service
  datasource:
    url: jdbc:postgresql://ep-autumn-waterfall-atvjxk1j-pooler.c-9.us-east-1.aws.neon.tech/LedgerOne?sslmode=require
    username: neondb_owner
    password: REDACTED_NEON_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      url: ${REDIS_URL:rediss://default:REDACTED_UPSTASH_TOKEN@literate-termite-139779.upstash.io:6379}
