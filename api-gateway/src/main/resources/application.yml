server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/auth/**

        - id: invoice-service
          uri: lb://INVOICE-SERVICE
          predicates:
            - Path=/api/invoices/**, /api/clients/**, /api/profile/**

        - id: accounting-service
          uri: lb://ACCOUNTING-SERVICE
          predicates:
            - Path=/api/accounting/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET:ledgerone-auth-service-dev-secret-key-change-in-prod}
