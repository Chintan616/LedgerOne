server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: invoice-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/invoices/**, /api/clients/**

        - id: accounting-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/accounting/**

        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**

jwt:
  secret: ${JWT_SECRET:ledgerone-auth-service-dev-secret-key-change-in-prod}
