server:
  port: 8080

spring:
  application:
    name: ledgerone-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    redis:
      url: ${REDIS_URL}
      repositories:
        enabled: false
  cache:
    type: redis
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:ledgerone-auth-service-dev-secret-key-change-in-prod}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

logging:
  level:
    com.ledgerone: DEBUG
