server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://ep-autumn-waterfall-atvjxk1j-pooler.c-9.us-east-1.aws.neon.tech/LedgerOne?sslmode=require
    username: neondb_owner
    password: REDACTED_NEON_PASSWORD
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:ledgerone-auth-service-dev-secret-key-change-in-prod}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
