services:
  # LedgerOne Backend (modular monolith — Public Web Service)
  - type: web
    name: ledgerone-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AI_SERVICE_URL
        sync: false

  # LedgerOne AI Service (FastAPI + LangChain)
  - type: web
    name: ledgerone-ai
    env: docker
    dockerContext: ./ai-service
    dockerfilePath: ./ai-service/Dockerfile
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini
      - key: POSTGRES_URL
        sync: false
